apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: uptime-kuma-ingress
  namespace: uptime-kuma
  labels:
  annotations:
    kubernetes.io/ingress.class: traefik-external
spec:
  entryPoints:
    - websecure
    - web
  routes:
    - match: Host(`uptime.local.{{ .Values.cloudflare_zone }}`)
      kind: Rule
      services:
        - name: uptime-kuma
          port: 3001
  tls:
    domains:
    - main: local.{{ .Values.cloudflare_zone }}
      sans:
      - uptime.local.{{ .Values.cloudflare_zone }}
    secretName: local-{{ .Values.cloudflare_zone_hyphen }}-tls
