apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: minio-console-ingress
  namespace: minio
  labels:
  annotations:
    kubernetes.io/ingress.class: traefik-external
spec:
  entryPoints:
    - websecure
    - web
  routes:
    - match: Host(`minio.{{ .Values.cloudflare_zone }}`)
      kind: Rule
      services:
        - name: minio
          port: 9001
  tls:
    domains:
    - main: {{ .Values.cloudflare_zone }}
      sans:
      - minio.{{ .Values.cloudflare_zone }}
    secretName: {{ .Values.cloudflare_zone_hyphen }}-tls
