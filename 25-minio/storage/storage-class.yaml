kind: StorageClass
apiVersion: storage.k8s.io/v1
metadata:
  name: longhorn-minio-storage
provisioner: driver.longhorn.io
allowVolumeExpansion: true
reclaimPolicy: Delete
volumeBindingMode: Immediate
parameters:
  # Two replicas so a single node loss doesn't take the recordings with it.
  numberOfReplicas: "2"
  staleReplicaTimeout: "2880"
  fromBackup: ""
  fsType: "ext4"
  dataLocality: "best-effort"
  # Hard node anti-affinity: never two replicas on the same node.
  replicaSoftAntiAffinity: "disabled"
  migratable: "false"
  # MinIO constantly writes and scans its buckets — keep it off the HDD pool.
  diskSelector: "ssd"
