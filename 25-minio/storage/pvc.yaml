apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: minio-data
  namespace: minio
spec:
  # RWO on purpose: MinIO is a single writer (strategy: Recreate). RWX would let
  # two MinIO pods write the same backend and corrupt it.
  accessModes:
    - ReadWriteOnce
  storageClassName: longhorn-minio-storage
  # Longhorn-backed. Recordings are WebM video, so size for retention: a 1080p
  # meeting is very roughly ~1 GB/hour. Bump this if you keep recordings around.
  resources:
    requests:
      storage: 100Gi
