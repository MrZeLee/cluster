apiVersion: traefik.io/v1alpha1
kind: IngressRouteTCP
metadata:
  name: gitlab-ssh
  namespace: gitlab
  annotations:
    kubernetes.io/ingress.class: traefik-external
spec:
  # Raw SSH has no TLS/SNI, so HostSNI(`*`) is the only valid matcher; it makes
  # this a plain TCP passthrough on the gitlabssh entrypoint (Traefik VIP :2222).
  entryPoints:
    - gitlabssh
  routes:
    - match: HostSNI(`*`)
      services:
        - name: gitlab
          port: 22
