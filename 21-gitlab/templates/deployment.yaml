apiVersion: apps/v1
kind: Deployment
metadata:
  name: gitlab
  namespace: gitlab
spec:
  replicas: 1
  # Single RWO data volume — never run two pods at once.
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: gitlab
  template:
    metadata:
      labels:
        app: gitlab
    spec:
      # GitLab's hostname is used internally for SSH clone URLs and links.
      hostname: gitlab
      containers:
      - name: gitlab
        image: gitlab/gitlab-ce:18.10.1-ce.0
        ports:
        - containerPort: 80
          name: http
          protocol: TCP
        - containerPort: 22
          name: ssh
          protocol: TCP
        env:
        # TLS is terminated at Traefik, so nginx listens on plain HTTP while
        # external_url stays https so GitLab generates correct links/clone URLs.
        - name: GITLAB_OMNIBUS_CONFIG
          value: |
            external_url 'https://gitlab.{{ .Values.cloudflare_zone }}';
            # External git-SSH is exposed on 2222 (Traefik VIP / Hetzner forward),
            # so clone URLs must advertise 2222. The in-container sshd still
            # listens on 22; Traefik routes :2222 -> gitlab service :22.
            gitlab_rails['gitlab_shell_ssh_port'] = 2222;
            nginx['listen_port'] = 80;
            nginx['listen_https'] = false;
            nginx['proxy_set_headers'] = { 'X-Forwarded-Proto' => 'https', 'X-Forwarded-Ssl' => 'on' };
            # Expose GitLab's own metrics/exporters, but do NOT run the bundled
            # Prometheus server or Alertmanager: the cluster already runs
            # kube-prometheus-stack (09-monitoring), which scrapes the Rails
            # /-/metrics endpoint via the ServiceMonitor in this bundle.
            prometheus_monitoring['enable'] = true;
            prometheus['enable'] = false;
            alertmanager['enable'] = false;
            # Omnibus auto-sizes Puma/Sidekiq from the HOST cpu count (nproc=24 on
            # this node), not the pod's cgroup limit. That spawned 24 Puma workers
            # (~0.9GB each, ~21GB total) and OOM-killed the container roughly every
            # 2.5h. This instance serves <=5 users, so pin both pools small.
            puma['worker_processes'] = 2;
            sidekiq['max_concurrency'] = 10;
            # Allow the pod network to reach /-/health, /-/readiness, /-/liveness
            # (kube-probes) and /-/metrics (the ServiceMonitor scrape); otherwise
            # GitLab returns 404 to them.
            gitlab_rails['monitoring_whitelist'] = ['127.0.0.0/8', '10.42.0.0/16'];
        # Applied only on the very first initialization (empty data volume).
        - name: GITLAB_ROOT_PASSWORD
          valueFrom:
            secretKeyRef:
              name: gitlab-secrets
              key: root-password
        volumeMounts:
        - name: gitlab-config
          mountPath: /etc/gitlab
        - name: gitlab-data
          mountPath: /var/opt/gitlab
        - name: gitlab-logs
          mountPath: /var/log/gitlab
        - name: shm
          mountPath: /dev/shm
        # These are GitLab application settings (stored in the DB, NOT settable
        # via gitlab.rb), so seed them here: disable open sign-up and the Web IDE
        # single-origin fallback. Wait with a cheap local curl (NOT a repeated
        # `gitlab-rails runner`, which boots a full ~1.5GB Rails each poll and
        # OOM-kills the 8Gi container during reconfigure) until GitLab is serving,
        # then run the heavy runner exactly once. Backgrounded so it returns 0
        # immediately and never fails the hook; idempotent, re-seeds on a fresh
        # data volume.
        lifecycle:
          postStart:
            exec:
              command:
              - /bin/sh
              - -c
              - |
                ( until curl -sf -o /dev/null http://127.0.0.1:80/-/health; do sleep 10; done
                  gitlab-rails runner "ApplicationSetting.current.update!(signup_enabled: false, vscode_extension_marketplace_single_origin_fallback_enabled: false)" ) &
        # First boot runs a full reconfigure, which can take several minutes;
        # give it a long startup window before liveness/readiness kick in.
        startupProbe:
          httpGet:
            path: /-/health
            port: 80
          periodSeconds: 10
          failureThreshold: 60
        readinessProbe:
          httpGet:
            path: /-/health
            port: 80
          periodSeconds: 15
          timeoutSeconds: 5
        livenessProbe:
          httpGet:
            path: /-/health
            port: 80
          periodSeconds: 30
          timeoutSeconds: 5
          failureThreshold: 5
        resources:
          # GitLab omnibus is heavy (bundled Postgres, Redis, Puma, Sidekiq), but
          # with Puma pinned to 2 workers the steady state is ~4-5Gi. 8Gi leaves
          # headroom for the boot peak (reconfigure + the one-shot gitlab-rails
          # runner, which briefly boots a full ~1.5Gi Rails) and for CI API load.
          # CI jobs run in separate runner pods off the node's free RAM, not here.
          requests:
            memory: "4Gi"
            cpu: "1"
          limits:
            memory: "8Gi"
            cpu: "4"

      volumes:
      - name: gitlab-config
        persistentVolumeClaim:
          claimName: gitlab-config
      - name: gitlab-data
        persistentVolumeClaim:
          claimName: gitlab-data
      - name: gitlab-logs
        emptyDir: {}
      - name: shm
        emptyDir:
          medium: Memory
          sizeLimit: 256Mi

      restartPolicy: Always