apiVersion: apps/v1
kind: Deployment
metadata:
  name: stirling-pdf
  namespace: stirling-pdf
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: stirling-pdf
  template:
    metadata:
      labels:
        app: stirling-pdf
    spec:
      containers:
      - name: stirling-pdf
        image: stirlingtools/stirling-pdf:latest
        ports:
        - containerPort: 8080
          name: http
          protocol: TCP
        env:
        # Stirling PDF's built-in login secures the public route, so no Traefik
        # basicAuth middleware is used. The initial admin credentials below seed
        # the user DB on FIRST startup only (the user is forced to change the
        # password on first login); they are ignored once the configs PVC holds
        # an initialized user DB.
        - name: DISABLE_ADDITIONAL_FEATURES
          value: "false"
        - name: SECURITY_ENABLELOGIN
          value: "true"
        - name: SECURITY_INITIALLOGIN_USERNAME
          value: "mrzelee"
        - name: SECURITY_INITIALLOGIN_PASSWORD
          valueFrom:
            secretKeyRef:
              name: stirling-pdf-auth
              key: password
        - name: SYSTEM_DEFAULTLOCALE
          value: "en-US"
        volumeMounts:
        - name: configs
          mountPath: /configs
        - name: tmp
          mountPath: /tmp
        resources:
          requests:
            memory: "512Mi"
            cpu: "100m"
          limits:
            memory: "2Gi"
            cpu: "1000m"
      volumes:
      - name: configs
        persistentVolumeClaim:
          claimName: stirling-pdf-configs
      - name: tmp
        emptyDir: {}
      restartPolicy: Always
