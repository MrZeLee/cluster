persistence:
  # Fence the default "longhorn" class off the n5pro HDD pool: new volumes only
  # schedule on disks tagged "ssd" (tags are set manually — see README.md).
  # Bulk media classes (jellyfin/owncloud/minio) stay selector-free on purpose —
  # their 2nd replica living on the HDD is intended. Existing volumes keep their
  # old (empty) diskSelector; move them per-volume in the Longhorn UI.
  defaultDiskSelector:
    enable: true
    selector: "ssd"

defaultSettings:
  autoDeletePodWhenVolumeDetachedUnexpectedly: "true"
  nodeDownPodDeletionPolicy: "delete-both-statefulset-and-deployment-pod"
  replicaAutoBalance: "best-effort"
  backupCompressionMethod: "none"
  # Hard node anti-affinity: a volume's replicas must be on different nodes
  # (never two on the same node). This is Longhorn's default, declared here so
  # it is explicit and survives chart upgrades / setting drift.
  replicaSoftAntiAffinity: "false"
  # Wait this long for a failed replica's node/disk to come back before giving
  # up and rebuilding a fresh (full) replica elsewhere. Within this window the
  # recovered replica is *reused* and only its delta is synced (delta rebuild),
  # which matters for the manually-unlocked nodes (n5pro/server): unlock within
  # 30 min of a reboot and the replica resyncs quickly instead of a full ~3 h
  # rebuild. Default is 600s (10 min).
  replicaReplenishmentWaitInterval: "1800"
  # All of a node's Longhorn replicas share one backing store (on n5pro: a single
  # spinning-HDD raidz1 zvol). A full rebuild of a large volume (e.g. jellyfin-media,
  # 2.5 TB) can saturate that pool and push per-I/O latency past the engine timeout
  # for *every* attached volume at once — which on 2026-07-09 aborted the ext4
  # journals of 7 volumes simultaneously and remounted them read-only. These two
  # settings blunt that failure mode:
  #
  # Only one replica rebuild per node at a time (default 5), so concurrent rebuilds
  # can't stack and collectively starve live DB/app I/O on the shared HDD pool.
  concurrentReplicaRebuildPerNodeLimit: "1"
  # How long the engine waits for a replica I/O before declaring it failed. Default
  # is 8s; the HDD pool's loaded latency spiked to 16-23s during the incident, so
  # 8s tripped a false failure and cascaded. Max it out (30s) so a transient pool
  # latency spike is tolerated instead of aborting every volume's filesystem.
  # NOTE: takes effect for volumes on their next attach.
  engineReplicaTimeout: "30"
