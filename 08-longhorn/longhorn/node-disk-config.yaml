---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: longhorn-disk-configurator
  namespace: longhorn-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: longhorn-disk-configurator
rules:
- apiGroups: ["longhorn.io"]
  resources: ["nodes"]
  verbs: ["get", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: longhorn-disk-configurator
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: longhorn-disk-configurator
subjects:
- kind: ServiceAccount
  name: longhorn-disk-configurator
  namespace: longhorn-system
---
apiVersion: batch/v1
kind: Job
metadata:
  name: longhorn-disk-config-n5pro-v2
  namespace: longhorn-system
spec:
  ttlSecondsAfterFinished: 300
  template:
    spec:
      serviceAccountName: longhorn-disk-configurator
      restartPolicy: OnFailure
      containers:
      - name: configure
        image: bitnami/kubectl:latest
        command:
        - /bin/sh
        - -c
        - |
          # Disable old ZFS dataset disk and evict replicas, add new ext4 zvol disk.
          # A separate job (longhorn-disk-config-n5pro-remove-old) will delete the
          # old disk once Longhorn confirms it has no remaining replicas.
          kubectl patch nodes.longhorn.io n5pro -n longhorn-system --type=merge -p '{
            "spec": {
              "disks": {
                "longhorn-hdd": {
                  "allowScheduling": false,
                  "evictionRequested": true
                },
                "longhorn-hdd-ext4": {
                  "allowScheduling": true,
                  "diskDriver": "",
                  "diskType": "filesystem",
                  "evictionRequested": false,
                  "path": "/mnt/longhorn-hdd-ext4",
                  "storageReserved": 0,
                  "tags": ["hdd"]
                }
              }
            }
          }'
