---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: longhorn-disk-configurator
  namespace: longhorn-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: longhorn-disk-configurator
rules:
- apiGroups: ["longhorn.io"]
  resources: ["nodes"]
  verbs: ["get", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: longhorn-disk-configurator
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: longhorn-disk-configurator
subjects:
- kind: ServiceAccount
  name: longhorn-disk-configurator
  namespace: longhorn-system
---
apiVersion: batch/v1
kind: Job
metadata:
  name: longhorn-disk-config-n5pro-v3
  namespace: longhorn-system
spec:
  ttlSecondsAfterFinished: 300
  template:
    spec:
      serviceAccountName: longhorn-disk-configurator
      restartPolicy: OnFailure
      containers:
      - name: configure
        image: bitnami/kubectl:latest
        command:
        - /bin/sh
        - -c
        - |
          # Assert n5pro's HDD Longhorn disk (the 20 TB zvol formatted ext4).
          # Idempotent — safe to re-run on every sync.
          kubectl patch nodes.longhorn.io n5pro -n longhorn-system --type=merge -p '{
            "spec": {
              "disks": {
                "longhorn-hdd-ext4": {
                  "allowScheduling": true,
                  "diskDriver": "",
                  "diskType": "filesystem",
                  "evictionRequested": false,
                  "path": "/mnt/longhorn-hdd-ext4",
                  "storageReserved": 0,
                  "tags": ["hdd"]
                }
              }
            }
          }'
          # Remove the old ZFS-dataset disk ("longhorn-hdd") left over from the
          # migration. A --type=merge patch cannot delete map keys, so it must be
          # removed explicitly. Guarded so re-runs succeed once it is gone.
          if kubectl get nodes.longhorn.io n5pro -n longhorn-system \
               -o jsonpath='{.spec.disks.longhorn-hdd}' | grep -q .; then
            kubectl patch nodes.longhorn.io n5pro -n longhorn-system --type=json \
              -p '[{"op":"remove","path":"/spec/disks/longhorn-hdd"}]'
          fi
