kind: StorageClass
apiVersion: storage.k8s.io/v1
metadata:
  name: longhorn-encrypted
provisioner: driver.longhorn.io
allowVolumeExpansion: true
reclaimPolicy: Delete
volumeBindingMode: Immediate
parameters:
  numberOfReplicas: "1"
  staleReplicaTimeout: "2880"
  fromBackup: ""
  fsType: "ext4"
  dataLocality: "best-effort"
  # Pins volumes to the ZFS-encrypted dataset (Longhorn disk tagged "encrypted",
  # mounted at /mnt/longhorn-secure). After a reboot that disk stays NotReady until
  # the dataset is unlocked on the node, so these PVCs are unavailable until then.
  diskSelector: "encrypted"
