---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: headscale-router
  namespace: headscale-router
---
# Lets the tailscale container read/write its state Secret (TS_KUBE_SECRET).
# `create` cannot be restricted by resourceName, and this is a dedicated
# single-app namespace, so the rules are scoped to secrets in this namespace.
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: headscale-router
  namespace: headscale-router
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "list", "watch", "create", "update", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: headscale-router
  namespace: headscale-router
subjects:
  - kind: ServiceAccount
    name: headscale-router
    namespace: headscale-router
roleRef:
  kind: Role
  name: headscale-router
  apiGroup: rbac.authorization.k8s.io