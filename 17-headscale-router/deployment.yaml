apiVersion: apps/v1
kind: Deployment
metadata:
  name: headscale-router
  namespace: headscale-router
  annotations:
    # Stakater Reloader: roll this Deployment whenever a Secret/ConfigMap it
    # references changes (e.g. headscale-router-secret rotated via SealedSecrets).
    reloader.stakater.com/auto: "true"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: headscale-router
  template:
    metadata:
      labels:
        app: headscale-router
    spec:
      # Tailscale node state is stored in the headscale-router-state Secret
      # (TS_KUBE_SECRET below), so the pod can re-register as the same node after
      # a restart/reboot instead of getting a deduplicated name (cluster-xxxx).
      # The ServiceAccount grants access to that Secret (see rbac.yaml).
      serviceAccountName: headscale-router
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet
      containers:
        - name: tailscale
          image: ghcr.io/tailscale/tailscale:stable
          env:
            - name: TS_AUTHKEY
              valueFrom:
                secretKeyRef:
                  name: headscale-router-secret
                  key: authkey
            - name: TS_EXTRA_ARGS
              valueFrom:
                secretKeyRef:
                  name: headscale-router-secret
                  key: extra_args
            - name: TS_ROUTES
              value: "192.168.1.0/24"
            - name: TS_ACCEPT_DNS
              value: "false"
            # Persist node identity in a K8s Secret (etcd-backed) — no storage
            # dependency, survives reboots, and does not pin the pod to a node.
            - name: TS_KUBE_SECRET
              value: "headscale-router-state"
            - name: TS_USERSPACE
              value: "false"
            - name: TS_HOSTNAME
              value: "cluster"
          securityContext:
            capabilities:
              add:
                - NET_ADMIN
                - SYS_MODULE
          volumeMounts:
            - name: tun
              mountPath: /dev/net/tun
      volumes:
        - name: tun
          hostPath:
            path: /dev/net/tun