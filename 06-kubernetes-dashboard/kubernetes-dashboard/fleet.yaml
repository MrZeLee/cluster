defaultNamespace: kubernetes-dashboard

labels:
  app: kubernetes-dashboard

helm:
  # GitHub Pages repo (https://kubernetes.github.io/dashboard) is currently 404;
  # point straight at the release tarball instead. Revert to repo+version if Pages returns.
  chart: https://github.com/kubernetes/dashboard/releases/download/kubernetes-dashboard-7.13.0/kubernetes-dashboard-7.13.0.tgz
  releaseName: kubernetes-dashboard

kustomize:
  dir: '.'

# Optional: Configuration if you need to apply specific labels or annotations to the namespace
namespaceLabels:
  managed-by: Fleet
namespaceAnnotations:
  fleet.cattle.io/managed: "true"

# Optional: You might want to pause the rollout to manually inspect before deployment
paused: false

# Deployment strategy can be configured if needed (for larger or more complex deployments)
rolloutStrategy:
  maxUnavailable: 10%

dependsOn:
  - selector:
    matchLabels:
      app: traefik-helper


