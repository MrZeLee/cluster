apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: ocis-ingress
  namespace: owncloud
  labels:
  annotations:
    kubernetes.io/ingress.class: traefik-external
spec:
  entryPoints:
    - websecure
    - web
  routes:
    - match: Host(`owncloud.{{ .Values.cloudflare_zone }}`)
      kind: Rule
      services:
        - name: ocis
          port: 9200
  tls:
    domains:
    - main: {{ .Values.cloudflare_zone }}
      sans:
      - owncloud.{{ .Values.cloudflare_zone }}
    secretName: {{ .Values.cloudflare_zone_hyphen }}-tls
