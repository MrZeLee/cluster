---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: jellyfin-volume-patcher
  namespace: media-server
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: jellyfin-volume-patcher
rules:
- apiGroups: ["longhorn.io"]
  resources: ["volumes"]
  verbs: ["get", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: jellyfin-volume-patcher
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: jellyfin-volume-patcher
subjects:
- kind: ServiceAccount
  name: jellyfin-volume-patcher
  namespace: media-server
---
apiVersion: batch/v1
kind: Job
metadata:
  name: jellyfin-media-increase-replicas
  namespace: media-server
spec:
  ttlSecondsAfterFinished: 300
  template:
    spec:
      serviceAccountName: jellyfin-volume-patcher
      restartPolicy: OnFailure
      containers:
      - name: patch
        image: bitnami/kubectl:latest
        command:
        - /bin/sh
        - -c
        - |
          kubectl patch volumes.longhorn.io pvc-2f32f23c-76dc-4c6f-b90a-2c40b1b14c11 \
            -n longhorn-system --type=merge \
            -p '{"spec":{"numberOfReplicas":2,"diskSelector":[]}}'
