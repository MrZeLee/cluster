apiVersion: apps/v1
kind: Deployment
metadata:
  name: pinchflat
  namespace: media-server
  annotations:
    # Stakater Reloader: roll this Deployment whenever a Secret/ConfigMap it
    # references changes (e.g. qbittorrent-secrets rotated via SealedSecrets).
    reloader.stakater.com/auto: "true"
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: pinchflat
  template:
    metadata:
      labels:
        app: pinchflat
    spec:
      containers:
      # PIA WireGuard VPN sidecar (MrZeLee/docker-wireguard-pia)
      - name: wireguard
        image: mrzelee/docker-wireguard-pia:latest
        env:
        - name: LOC
          value: "spain,france,swiss"
        - name: USER
          valueFrom:
            secretKeyRef:
              name: qbittorrent-secrets
              key: pia-username
        - name: PASS
          valueFrom:
            secretKeyRef:
              name: qbittorrent-secrets
              key: pia-password
        # Cluster-internal traffic (Traefik, CoreDNS, other apps) bypasses the
        # tunnel; private ranges only, not an internet escape path
        - name: LOCAL_NETWORK
          value: "10.42.0.0/16,10.43.0.0/16"
        # 0 = image leaves resolv.conf alone; the post-up hook installs split
        # DNS instead (cluster names -> CoreDNS, the rest -> PIA DNS via wg0)
        - name: VPNDNS
          value: "0"
        # Re-register keys through a leak-limited bypass if the endpoint dies,
        # without downing wg0 (fixes the stale-tunnel reconnect deadlock)
        - name: RECONNECT
          value: "1"
        # PIA expires idle WireGuard keys
        - name: KEEPALIVE
          value: "25"
        securityContext:
          capabilities:
            add:
            - NET_ADMIN
            - SYS_MODULE
          privileged: true
        volumeMounts:
        - name: vpn-dns-scripts
          mountPath: /pia/scripts
        startupProbe:
          exec:
            command:
            - /scripts/healthcheck.sh
          initialDelaySeconds: 10
          periodSeconds: 15
          timeoutSeconds: 10
          failureThreshold: 20  # Allow 5 minutes for VPN setup
        livenessProbe:
          exec:
            command:
            - /scripts/healthcheck.sh
          periodSeconds: 30
          timeoutSeconds: 10
          failureThreshold: 3
        readinessProbe:
          exec:
            command:
            - /scripts/healthcheck.sh
          periodSeconds: 15
          timeoutSeconds: 10
          failureThreshold: 3
        resources:
          requests:
            memory: "64Mi"
            cpu: "100m"
          limits:
            memory: "128Mi"
            cpu: "200m"

      # Pinchflat container
      - name: pinchflat
        image: ghcr.io/kieraneglin/pinchflat:latest
        command:
        - /bin/bash
        - -c
        - |
          echo "Waiting for VPN interface before starting Pinchflat..."
          # /sys check needs no extra tools (the VPN firewall blocks apt)
          while [ ! -d /sys/class/net/wg0 ]; do
            echo "Waiting for VPN interface wg0..."
            sleep 5
          done

          echo "VPN interface ready, starting Pinchflat..."
          exec /app/bin/docker_start
        ports:
        - containerPort: 8945
          name: webui
          protocol: TCP
        env:
        - name: TZ
          value: "America/New_York"
        - name: PINCHFLAT_HOST
          value: "0.0.0.0"
        - name: PINCHFLAT_PORT
          value: "8945"
        - name: BASIC_AUTH_USERNAME
          valueFrom:
            secretKeyRef:
              name: pinchflat-secrets
              key: auth-username
        - name: BASIC_AUTH_PASSWORD
          valueFrom:
            secretKeyRef:
              name: pinchflat-secrets
              key: auth-password
        volumeMounts:
        - name: pinchflat-config
          mountPath: /config
        - name: jellyfin-media-shared
          mountPath: /downloads
          subPath: youtube
        resources:
          requests:
            memory: "256Mi"
            cpu: "200m"
          limits:
            memory: "2Gi"
            cpu: "1000m"

      volumes:
      - name: vpn-dns-scripts
        configMap:
          name: vpn-dns-scripts
          defaultMode: 0755
      - name: pinchflat-config
        persistentVolumeClaim:
          claimName: pinchflat-config
      - name: jellyfin-media-shared
        persistentVolumeClaim:
          claimName: jellyfin-media

      # Containers in same pod automatically share network namespace

      # Cluster DNS stays: apps resolve Services via CoreDNS; the sidecar's
      # firewall confines all other egress to the tunnel
      dnsPolicy: ClusterFirst
      restartPolicy: Always
