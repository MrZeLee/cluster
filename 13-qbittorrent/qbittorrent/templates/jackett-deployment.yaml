apiVersion: apps/v1
kind: Deployment
metadata:
  name: jackett
  namespace: media-server
  annotations:
    # Stakater Reloader: roll this Deployment whenever a Secret/ConfigMap it
    # references changes (e.g. qbittorrent-secrets rotated via SealedSecrets).
    reloader.stakater.com/auto: "true"
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: jackett
  template:
    metadata:
      labels:
        app: jackett
    spec:
      containers:
      # PIA WireGuard VPN sidecar (MrZeLee/docker-wireguard-pia)
      - name: wireguard
        image: mrzelee/docker-wireguard-pia:latest
        env:
        - name: LOC
          value: "spain,france,swiss"
        - name: USER
          valueFrom:
            secretKeyRef:
              name: qbittorrent-secrets
              key: pia-username
        - name: PASS
          valueFrom:
            secretKeyRef:
              name: qbittorrent-secrets
              key: pia-password
        # Cluster-internal traffic (Traefik, CoreDNS, other apps) bypasses the
        # tunnel; private ranges only, not an internet escape path
        - name: LOCAL_NETWORK
          value: "10.42.0.0/16,10.43.0.0/16"
        # 0 = image leaves resolv.conf alone; the post-up hook installs split
        # DNS instead (cluster names -> CoreDNS, the rest -> PIA DNS via wg0)
        - name: VPNDNS
          value: "0"
        # Re-register keys through a leak-limited bypass if the endpoint dies,
        # without downing wg0 (fixes the stale-tunnel reconnect deadlock)
        - name: RECONNECT
          value: "1"
        # PIA expires idle WireGuard keys
        - name: KEEPALIVE
          value: "25"
        securityContext:
          capabilities:
            add:
            - NET_ADMIN
            - SYS_MODULE
          privileged: true
        volumeMounts:
        - name: vpn-dns-scripts
          mountPath: /pia/scripts
        startupProbe:
          exec:
            command:
            - /scripts/healthcheck.sh
          initialDelaySeconds: 10
          periodSeconds: 15
          timeoutSeconds: 10
          failureThreshold: 20  # Allow 5 minutes for VPN setup
        livenessProbe:
          exec:
            command:
            - /scripts/healthcheck.sh
          periodSeconds: 30
          timeoutSeconds: 10
          failureThreshold: 3
        readinessProbe:
          exec:
            command:
            - /scripts/healthcheck.sh
          periodSeconds: 15
          timeoutSeconds: 10
          failureThreshold: 3
        resources:
          requests:
            memory: "64Mi"
            cpu: "100m"
          limits:
            memory: "128Mi"
            cpu: "200m"

      # Jackett container
      - name: jackett
        image: linuxserver/jackett:latest
        command:
        - /bin/bash
        - -c
        - |
          echo "Waiting for VPN interface before starting Jackett..."
          # Wait for wg0 interface to be available for binding
          while ! ip link show wg0 > /dev/null 2>&1; do
            echo "Waiting for VPN interface wg0..."
            sleep 5
          done
          
          echo "VPN interface ready, starting Jackett..."
          exec /init
        ports:
        - containerPort: 9117
          name: webui
          protocol: TCP
        env:
        - name: PUID
          value: "1000"
        - name: PGID
          value: "1000"
        - name: TZ
          value: "America/New_York"
        - name: AUTO_UPDATE
          value: "true"
        volumeMounts:
        - name: jackett-config
          mountPath: /config
        startupProbe:
          tcpSocket:
            port: 9117
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 18  # Allow 3 minutes for startup
        livenessProbe:
          tcpSocket:
            port: 9117
          initialDelaySeconds: 10
          periodSeconds: 30
          timeoutSeconds: 10
          failureThreshold: 3
        readinessProbe:
          tcpSocket:
            port: 9117
          initialDelaySeconds: 5
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        resources:
          requests:
            memory: "64Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "500m"
      
      volumes:
      - name: vpn-dns-scripts
        configMap:
          name: vpn-dns-scripts
          defaultMode: 0755
      - name: jackett-config
        persistentVolumeClaim:
          claimName: jackett-config
      - name: jellyfin-media-shared
        persistentVolumeClaim:
          claimName: jellyfin-media
      
      # Use cluster DNS initially, VPN will override DNS via iptables rules
      dnsPolicy: ClusterFirst
      restartPolicy: Always
