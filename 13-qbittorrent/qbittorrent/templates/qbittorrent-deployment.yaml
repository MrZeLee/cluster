apiVersion: apps/v1
kind: Deployment
metadata:
  name: qbittorrent
  namespace: media-server
  annotations:
    # Stakater Reloader: roll this Deployment whenever a Secret/ConfigMap it
    # references changes (e.g. qbittorrent-secrets rotated via SealedSecrets).
    reloader.stakater.com/auto: "true"
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: qbittorrent
  template:
    metadata:
      labels:
        app: qbittorrent
    spec:
      containers:
      # PIA WireGuard VPN sidecar (MrZeLee/docker-wireguard-pia)
      - name: wireguard
        image: mrzelee/docker-wireguard-pia:latest
        env:
        - name: LOC
          value: "spain,france,swiss"
        - name: USER
          valueFrom:
            secretKeyRef:
              name: qbittorrent-secrets
              key: pia-username
        - name: PASS
          valueFrom:
            secretKeyRef:
              name: qbittorrent-secrets
              key: pia-password
        # Cluster-internal traffic (Traefik, CoreDNS, other apps) bypasses the
        # tunnel; private ranges only, not an internet escape path
        - name: LOCAL_NETWORK
          value: "10.42.0.0/16,10.43.0.0/16"
        # 0 = image leaves resolv.conf alone; the post-up hook installs split
        # DNS instead (cluster names -> CoreDNS, the rest -> PIA DNS via wg0)
        - name: VPNDNS
          value: "0"
        # Re-register keys through a leak-limited bypass if the endpoint dies,
        # without downing wg0 (fixes the stale-tunnel reconnect deadlock)
        - name: RECONNECT
          value: "1"
        # PIA expires idle WireGuard keys
        - name: KEEPALIVE
          value: "25"
        # Port forwarding: port lands in /pia-shared/port.dat and is pushed
        # into qBittorrent by update-port.sh (LocalHostAuth=false, no login)
        - name: PORT_FORWARDING
          value: "1"
        - name: PORT_SCRIPT
          value: "sh /config-template/update-port.sh"
        securityContext:
          capabilities:
            add:
            - NET_ADMIN
            - SYS_MODULE
          privileged: true
        volumeMounts:
        - name: vpn-dns-scripts
          mountPath: /pia/scripts
        - name: shared-data
          mountPath: /pia-shared
        - name: qbittorrent-config-template
          mountPath: /config-template
        startupProbe:
          exec:
            command:
            - /scripts/healthcheck.sh
          initialDelaySeconds: 10
          periodSeconds: 15
          timeoutSeconds: 10
          failureThreshold: 20  # Allow 5 minutes for VPN setup
        livenessProbe:
          exec:
            command:
            - /scripts/healthcheck.sh
          periodSeconds: 30
          timeoutSeconds: 10
          failureThreshold: 3
        readinessProbe:
          exec:
            command:
            - /scripts/healthcheck.sh
          periodSeconds: 15
          timeoutSeconds: 10
          failureThreshold: 3
        resources:
          requests:
            memory: "64Mi"
            cpu: "100m"
          limits:
            memory: "128Mi"
            cpu: "200m"
      
      # qBittorrent container
      - name: qbittorrent
        image: linuxserver/qbittorrent:latest
        command:
        - /bin/bash
        - -c
        - |
          echo "Waiting for VPN interface before starting qBittorrent..."
          # Wait for wg0 interface to be available for binding
          while ! ip link show wg0 > /dev/null 2>&1; do
            echo "Waiting for VPN interface wg0..."
            sleep 5
          done

          echo "Setting up qBittorrent config with VPN interface binding..."

          # Create config directory with proper ownership
          mkdir -p /config/qBittorrent

          # Get the forwarded port from shared volume or use default
          if [ -f /pia-shared/port.dat ]; then
            FORWARDED_PORT=$(cat /pia-shared/port.dat)
            echo "Found existing forwarded port: $FORWARDED_PORT"
          else
            FORWARDED_PORT="6881"
            echo "No existing port found, using default: $FORWARDED_PORT"
          fi
          
          # Copy template and replace port placeholder
          cp /config-template/qBittorrent.conf /config/qBittorrent/qBittorrent.conf
          sed -i "s/PLACEHOLDER_PORT/$FORWARDED_PORT/g" /config/qBittorrent/qBittorrent.conf
          echo "qBittorrent config updated with port: $FORWARDED_PORT"
          
          echo "qBittorrent config created - VPN interface binding enforced"
          echo "VPN and config ready, starting qBittorrent..."
          exec /init
        ports:
        - containerPort: 8080
          name: webui
          protocol: TCP
        env:
        - name: PUID
          value: "1000"
        - name: PGID
          value: "1000"
        - name: TZ
          value: "America/New_York"
        - name: WEBUI_PORT
          value: "8080"
        volumeMounts:
        - name: qbittorrent-config
          mountPath: /config
        - name: jellyfin-media-shared
          mountPath: /downloads
        - name: shared-data
          mountPath: /pia-shared
        - name: qbittorrent-config-template
          mountPath: /config-template
        startupProbe:
          httpGet:
            path: /
            port: 8080
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 12  # Allow 2 minutes for startup
        livenessProbe:
          httpGet:
            path: /
            port: 8080
          initialDelaySeconds: 10
          periodSeconds: 30
          timeoutSeconds: 10
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        resources:
          requests:
            memory: "256Mi"
            cpu: "200m"
          limits:
            memory: "6Gi"
            cpu: "2000m"
      
      volumes:
      - name: vpn-dns-scripts
        configMap:
          name: vpn-dns-scripts
          defaultMode: 0755
      - name: shared-data
        emptyDir: {}
      - name: qbittorrent-config
        persistentVolumeClaim:
          claimName: qbittorrent-config
      - name: jellyfin-media-shared
        persistentVolumeClaim:
          claimName: jellyfin-media
      - name: qbittorrent-config-template
        configMap:
          name: qbittorrent-config-template
      
      # Containers in same pod automatically share network namespace
      
      # Use cluster DNS initially, VPN will override DNS via iptables rules
      dnsPolicy: ClusterFirst
      restartPolicy: Always

