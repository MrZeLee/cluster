apiVersion: v1
kind: ConfigMap
metadata:
  name: house-dns-corefile
  namespace: house-dns
data:
  Corefile: |
    # Authoritative wildcard for the whole mourahouse.com zone: every host
    # (Ingress, IngressRoute, *.local.*, future services) is fronted by the same
    # Traefik LoadBalancer, so they all resolve to its LAN IP. Tailscale split-DNS
    # sends mourahouse.com queries here; clients then reach Traefik over the
    # subnet route advertised by the Connector.
    mourahouse.com:53 {
        errors
        health :8080
        ready :8181
        template IN A {
            match .*mourahouse\.com\.
            answer "{{ .Name }} 60 IN A 192.168.1.10"
        }
        # Answer AAAA (IPv6) with an immediate authoritative NODATA. Without this
        # the AAAA query matches no plugin, falls through, and times out (~15s)
        # into SERVFAIL — stalling resolvers that query A and AAAA in parallel.
        template IN AAAA {
            match .*mourahouse\.com\.
            rcode NOERROR
        }
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: house-dns
  namespace: house-dns
  labels:
    app: house-dns
spec:
  replicas: 1
  selector:
    matchLabels:
      app: house-dns
  template:
    metadata:
      labels:
        app: house-dns
    spec:
      containers:
        - name: coredns
          image: coredns/coredns:1.11.3
          args: ["-conf", "/etc/coredns/Corefile"]
          ports:
            - name: dns-udp
              containerPort: 53
              protocol: UDP
            - name: health
              containerPort: 8080
              protocol: TCP
            - name: ready
              containerPort: 8181
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
          readinessProbe:
            httpGet:
              path: /ready
              port: 8181
          volumeMounts:
            - name: config
              mountPath: /etc/coredns
              readOnly: true
      volumes:
        - name: config
          configMap:
            name: house-dns-corefile
---
apiVersion: v1
kind: Service
metadata:
  name: house-dns
  namespace: house-dns
  annotations:
    # Tailnet device name the operator registers for this resolver. Use its
    # assigned tailnet IP as the split-DNS nameserver for mourahouse.com.
    tailscale.com/hostname: house-dns
spec:
  type: LoadBalancer
  loadBalancerClass: tailscale  # MetalLB ignores this; the Tailscale operator exposes it
  selector:
    app: house-dns
  ports:
    - name: dns-udp
      port: 53
      targetPort: 53
      protocol: UDP