defaultNamespace: tailscale

labels:
  app: tailscale-operator

helm:
  repo: https://pkgs.tailscale.com/helmcharts
  chart: tailscale-operator
  version: "1.98.4"  # bump to the latest from https://pkgs.tailscale.com/helmcharts/index.yaml
  releaseName: tailscale-operator
  valuesFiles:
    - values.yaml
  # oauth.clientId / oauth.clientSecret come from the sealed values-secret
  valuesFrom:
  - secretKeyRef:
      name: values-secret
      namespace: tailscale
      key: values.yaml

namespaceLabels:
  managed-by: Fleet
namespaceAnnotations:
  fleet.cattle.io/managed: "true"

paused: false

rolloutStrategy:
  maxUnavailable: 10%

dependsOn:
  - selector:
      matchLabels:
        app: tailscale-secrets