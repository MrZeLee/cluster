apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: minio-data
  namespace: meeting-bot
spec:
  accessModes:
    - ReadWriteOnce
  # Longhorn-backed. Recordings are WebM video, so size for retention: a 1080p
  # meeting is very roughly ~1 GB/hour. Bump this if you keep recordings around.
  storageClassName: longhorn
  resources:
    requests:
      storage: 100Gi
