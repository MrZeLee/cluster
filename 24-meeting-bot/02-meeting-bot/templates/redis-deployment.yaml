apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  namespace: meeting-bot
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
    spec:
      # meeting-bot's compose stack always ships a Redis and waits for it to be
      # healthy, so we run one too. We drive bots over REST (consumer disabled),
      # so this Redis holds no durable state and needs no persistence.
      containers:
        - name: redis
          image: redis:7-alpine
          ports:
            - containerPort: 6379
              name: redis
          resources:
            requests:
              cpu: 25m
              memory: 32Mi
            limits:
              cpu: 250m
              memory: 128Mi
