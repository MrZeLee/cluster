apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: meeting-bot-ingress
  namespace: meeting-bot
  labels:
  annotations:
    kubernetes.io/ingress.class: traefik-external
spec:
  entryPoints:
    - websecure
    - web
  routes:
    - match: Host(`meeting-bot.local.{{ .Values.cloudflare_zone }}`)
      kind: Rule
      services:
        - name: meeting-bot
          port: 3000
  tls:
    domains:
    - main: local.{{ .Values.cloudflare_zone }}
      sans:
      - meeting-bot.local.{{ .Values.cloudflare_zone }}
    secretName: local-{{ .Values.cloudflare_zone_hyphen }}-tls
