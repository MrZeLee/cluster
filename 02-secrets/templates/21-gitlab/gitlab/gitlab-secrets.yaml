apiVersion: v1
kind: Secret
metadata:
  name: gitlab-secrets
  namespace: gitlab
type: Opaque
stringData:
  # Initial password for the built-in "root" admin user. Min 8 chars.
  # Only applied on first initialization (empty data volume); change it in the
  # UI afterwards. Generate with: openssl rand -base64 24
  root-password: "change-this-to-a-strong-password"