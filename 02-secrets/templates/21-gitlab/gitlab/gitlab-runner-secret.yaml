apiVersion: v1
kind: Secret
metadata:
  name: gitlab-runner-secret
  namespace: gitlab
type: Opaque
stringData:
  # Runner AUTHENTICATION token (starts with "glrt-"). GitLab 18.x removed the
  # old registration-token flow, so create the runner in the UI first:
  #   Admin Area > CI/CD > Runners > New instance runner
  #   (tick "Run untagged jobs" if you want it to pick up jobs without tags)
  # then paste the shown token here. The gitlab-runner chart reads this exact
  # key ("runner-token") from the secret named in runner/values.yaml.
  runner-token: "glrt-REPLACE_WITH_AUTH_TOKEN"
