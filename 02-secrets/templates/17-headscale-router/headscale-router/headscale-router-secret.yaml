apiVersion: v1
kind: Secret
metadata:
  name: headscale-router-secret
  namespace: headscale-router
stringData:
  authkey: "HEADSCALE_PREAUTHKEY"
  # --advertise-exit-node makes this node offer itself as an exit node (routes
  # 0.0.0.0/0 + ::/0). It still must be approved in Headscale before clients can
  # use it (Headplane → the node's routes, or `headscale nodes approve-routes`).
  extra_args: "--login-server=https://HEADSCALE_DOMAIN --advertise-exit-node"