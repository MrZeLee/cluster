# The DaemonSet already runs privileged as root and mounts host /dev, so device
# access needs no extra config; smartctl auto-scans each node's disks.

# Upstream ships an amd64-only image, so we run our own multi-arch build (see
# image/Dockerfile, built by .github/workflows/smartctl-exporter-image.yml) to
# also cover the arm64 Pis and their USB SSDs. Pinned by digest so every rebuild
# forces a guaranteed, drift-free rollout.
image:
  repository: ghcr.io/mrzelee/smartctl-exporter
  tag: "v0.14.0@sha256:3fbe184815d882ba31370fcd037df735d7069276009377cb43c160d0e0fedcd4"

serviceMonitor:
  enabled: true
  # kube-prometheus-stack's Prometheus (serviceMonitorSelectorNilUsesHelmValues:
  # true) only scrapes ServiceMonitors labelled with its release name.
  extraLabels:
    release: monitoring-stack