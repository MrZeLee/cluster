# The DaemonSet already runs privileged as root and mounts host /dev, so device
# access needs no extra config; smartctl auto-scans each node's disks.

# smartctl-exporter publishes an amd64-only image (no arm64 on any registry), so
# it can't run on the arm64 Raspberry Pis — which boot from SD/USB with little
# usable SMART anyway. Pin to the amd64 nodes (server, n5pro, minipc), the
# storage-heavy machines where SMART matters (raid0, NVMe, the raidz HDDs).
nodeSelector:
  kubernetes.io/arch: amd64

serviceMonitor:
  enabled: true
  # kube-prometheus-stack's Prometheus (serviceMonitorSelectorNilUsesHelmValues:
  # true) only scrapes ServiceMonitors labelled with its release name.
  extraLabels:
    release: monitoring-stack