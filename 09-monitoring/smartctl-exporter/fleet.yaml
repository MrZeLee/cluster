defaultNamespace: monitoring

labels:
  app: smartctl-exporter

helm:
  # Per-node DaemonSet that runs `smartctl` and exposes SMART health metrics
  # (temperature, reallocated/pending sectors, SSD wear, NVMe media errors) for
  # the Prometheus/Grafana stack in the sibling `monitoring` bundle to scrape.
  chart: prometheus-smartctl-exporter
  repo: https://prometheus-community.github.io/helm-charts
  version: "0.17.1"  # app v0.14.0
  releaseName: smartctl-exporter
  valuesFiles:
    - values.yaml

namespaceLabels:
  managed-by: Fleet
namespaceAnnotations:
  fleet.cattle.io/managed: "true"

paused: false
rolloutStrategy:
  maxUnavailable: 10%

# NOTE: intentionally NO dependsOn. It only needs the ServiceMonitor CRD (long
# installed by the monitoring stack), but Fleet's dependsOn waits for the whole
# monitoring bundle to be Ready — which never happens while any node is down
# (node-exporter DaemonSet stuck N-1/N). Fleet retries ErrApplied, so a missing
# CRD on a fresh cluster self-heals without gating on monitoring's health.
